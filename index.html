<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakUp!">
<meta name="theme-color" content="#0d1117">
<title>SpeakUp! 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--gold:#f7c948;--coral:#ff6b6b;
  --blue:#4f8ef7;--green:#4ade80;--purple:#a78bfa;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;background:var(--bg);font-family:'Nunito',sans-serif;overflow:hidden;touch-action:manipulation;}
#app{height:100vh;width:100vw;background:linear-gradient(160deg,#0d1117 0%,#0f1e35 55%,#0a1628 100%);display:flex;flex-direction:column;overflow:hidden;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;flex-shrink:0;}
.logo-text{color:#fff;font-weight:900;font-size:20px;}.logo-text span{color:var(--gold);}
.logo-sub{color:rgba(255,255,255,0.38);font-size:10px;font-family:'Rubik',sans-serif;direction:rtl;}
.star-pill{display:flex;align-items:center;gap:5px;background:rgba(247,201,72,0.15);border:1px solid rgba(247,201,72,0.3);border-radius:20px;padding:5px 13px;}
.star-pill span{color:var(--gold);font-weight:800;font-size:17px;}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 32px;}
.scroll::-webkit-scrollbar{display:none;}
.screen{display:none;}.screen.active{display:block;}
.back-btn{background:rgba(255,255,255,0.1);border:none;border-radius:12px;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn{border:none;border-radius:16px;padding:14px 0;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:transform 0.1s;-webkit-appearance:none;}
.btn:active{transform:scale(0.96);}
.btn-ghost{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;}
.btn-blue{flex:1;background:linear-gradient(135deg,#4f8ef7,#2563eb);color:#fff;}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),var(--coral));color:#1a1a2e;}
.btn-off{opacity:0.3;pointer-events:none;}
.pbar-wrap{background:rgba(255,255,255,0.1);border-radius:8px;height:5px;margin-bottom:18px;}
.pbar{height:100%;border-radius:8px;transition:width 0.4s;}

/* PROFILES */
.pick-head{text-align:center;padding-top:6px;margin-bottom:20px;}
.pick-head h1{color:#fff;font-weight:900;font-size:26px;margin-bottom:5px;}
.pick-head p{color:rgba(255,255,255,0.4);font-size:14px;font-family:'Rubik',sans-serif;direction:rtl;}
.prof-card{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:22px;padding:18px 16px;margin-bottom:13px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:transform 0.12s;}
.prof-card:active{transform:scale(0.97);}
.p-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;background:rgba(255,255,255,0.08);}
.p-name{color:#fff;font-weight:900;font-size:22px;}
.p-sub{color:rgba(255,255,255,0.38);font-size:12px;font-family:'Rubik',sans-serif;direction:rtl;margin-top:2px;}
.p-levels{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.lvl-pip{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;}
.pip-b{background:rgba(79,142,247,0.2);color:#93c5fd;border:1px solid rgba(79,142,247,0.3);}
.pip-i{background:rgba(247,201,72,0.18);color:var(--gold);border:1px solid rgba(247,201,72,0.3);}
.pip-a{background:rgba(74,222,128,0.18);color:var(--green);border:1px solid rgba(74,222,128,0.3);}

/* LEVEL PICKER */
.lvl-head{text-align:center;padding:4px 0 18px;}
.lvl-head .av{font-size:52px;display:block;margin-bottom:8px;}
.lvl-head h2{color:#fff;font-weight:900;font-size:24px;}
.lvl-head p{color:rgba(255,255,255,0.4);font-size:13px;font-family:'Rubik',sans-serif;direction:rtl;margin-top:3px;}
.lvl-card{border-radius:22px;padding:18px 16px;margin-bottom:13px;cursor:pointer;transition:transform 0.12s;border:2px solid transparent;}
.lvl-card:active{transform:scale(0.97);}
.lc-b{background:linear-gradient(135deg,rgba(79,142,247,0.18),rgba(37,99,235,0.1));border-color:rgba(79,142,247,0.35);}
.lc-i{background:linear-gradient(135deg,rgba(247,201,72,0.15),rgba(255,107,107,0.08));border-color:rgba(247,201,72,0.35);}
.lc-a{background:linear-gradient(135deg,rgba(74,222,128,0.14),rgba(34,197,94,0.07));border-color:rgba(74,222,128,0.35);}
.lvl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.lvl-title{color:#fff;font-weight:900;font-size:19px;}
.lvl-badge{font-size:10px;font-weight:800;letter-spacing:0.5px;padding:3px 10px;border-radius:20px;}
.bdg-b{background:rgba(79,142,247,0.25);color:#93c5fd;}
.bdg-i{background:rgba(247,201,72,0.25);color:var(--gold);}
.bdg-a{background:rgba(74,222,128,0.25);color:var(--green);}
.lvl-desc{color:rgba(255,255,255,0.48);font-size:13px;margin-bottom:10px;}
.lvl-prow{display:flex;align-items:center;gap:8px;}
.lvl-pbar{flex:1;background:rgba(255,255,255,0.1);border-radius:6px;height:5px;}
.lvl-pfill{height:100%;border-radius:6px;}
.fill-b{background:linear-gradient(90deg,#93c5fd,#4f8ef7);}
.fill-i{background:linear-gradient(90deg,var(--gold),var(--coral));}
.fill-a{background:linear-gradient(90deg,var(--green),#22c55e);}
.lvl-ptext{color:rgba(255,255,255,0.35);font-size:11px;white-space:nowrap;}

/* HOME */
.home-hdr{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.hh-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,0.08);flex-shrink:0;}
.hh-name{color:#fff;font-weight:900;font-size:16px;}
.hh-sub{color:rgba(255,255,255,0.36);font-size:11px;font-family:'Rubik',sans-serif;direction:rtl;margin-top:2px;}
.sw-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:6px 11px;color:rgba(255,255,255,0.6);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.sec-label{color:rgba(255,255,255,0.4);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;}
.lesson-row{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:13px 15px;display:flex;align-items:center;gap:13px;margin-bottom:9px;cursor:pointer;transition:transform 0.1s;-webkit-appearance:none;}
.lesson-row:active{transform:scale(0.97);}
.lesson-row.done{background:rgba(74,222,128,0.09);border-color:rgba(74,222,128,0.27);}
.lr-emoji{font-size:30px;line-height:1;flex-shrink:0;}
.lr-info{flex:1;text-align:left;}
.lr-en{color:#fff;font-weight:800;font-size:15px;}
.lr-he{color:rgba(255,255,255,0.36);font-family:'Rubik',sans-serif;font-size:12px;direction:rtl;text-align:right;}
.lr-meta{color:rgba(255,255,255,0.26);font-size:11px;margin-top:2px;}
.lr-check{color:var(--green);font-size:16px;}
.lr-arrow{color:rgba(255,255,255,0.2);font-size:17px;}

/* ═══ FLASHCARD SCREEN ═══ */
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.card-hdr-title{color:#fff;font-weight:800;font-size:16px;}
.card-hdr-count{color:rgba(255,255,255,0.38);font-size:13px;}

/* The big word card */
.word-card{background:linear-gradient(135deg,#1a237e,#283593);border:1px solid rgba(255,255,255,0.12);border-radius:28px;padding:28px 20px;text-align:center;margin-bottom:16px;position:relative;}
.wc-hebrew{color:#fff;font-weight:900;font-size:52px;font-family:'Rubik',sans-serif;direction:rtl;line-height:1.1;margin-bottom:12px;}
.wc-english{color:rgba(255,255,255,0.55);font-size:22px;font-weight:700;margin-bottom:4px;}
.wc-pronun{display:inline-block;background:rgba(255,255,255,0.1);border-radius:12px;padding:5px 14px;color:rgba(255,255,255,0.7);font-size:14px;font-weight:700;margin-bottom:12px;}
.wc-example{color:rgba(255,255,255,0.4);font-size:13px;font-style:italic;line-height:1.5;}

/* LISTEN BUTTON */
.listen-btn{width:100%;border:none;border-radius:20px;padding:18px;background:linear-gradient(135deg,#4f8ef7,#2563eb);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;transition:transform 0.1s;}
.listen-btn:active{transform:scale(0.97);}
.listen-btn.playing{background:linear-gradient(135deg,#7c3aed,#5b21b6);animation:pulse 1s infinite;}

/* SPEAK BUTTON — big mic */
.speak-btn{width:100%;border:none;border-radius:20px;padding:20px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;transition:all 0.2s;position:relative;overflow:hidden;}
.speak-btn:active{transform:scale(0.97);}
.speak-btn.listening{background:linear-gradient(135deg,#16a34a,#15803d);animation:pulse 0.8s infinite;}
.speak-btn.listening::after{content:'';position:absolute;inset:-4px;border-radius:24px;border:3px solid rgba(74,222,128,0.6);animation:ripple 1s infinite;}

/* NAV */
.nav-row{display:flex;gap:10px;margin-bottom:9px;}

/* FEEDBACK */
.fb-card{border-radius:18px;padding:14px 16px;text-align:center;margin-bottom:12px;display:none;}
.fb-card.correct{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);}
.fb-card.wrong{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);}
.fb-emoji{font-size:32px;display:block;margin-bottom:4px;}
.fb-main{font-weight:800;font-size:17px;}
.fb-card.correct .fb-main{color:var(--green);}
.fb-card.wrong .fb-main{color:#f87171;}
.fb-heard{color:rgba(255,255,255,0.45);font-size:13px;margin-top:4px;font-family:'Rubik',sans-serif;}

/* QUIZ SCREEN — speak the translation */
.q-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:22px;padding:22px 16px;margin-bottom:16px;text-align:center;}
.q-prompt{color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:10px;font-family:'Rubik',sans-serif;direction:rtl;}
.q-hebrew{color:#fff;font-weight:900;font-size:52px;font-family:'Rubik',sans-serif;direction:rtl;line-height:1.15;}
.q-hint{color:rgba(255,255,255,0.3);font-size:12px;margin-top:8px;}

/* Big mic for quiz */
.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px;}
.mic-btn{width:100px;height:100px;border-radius:50%;border:none;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 8px 32px rgba(220,38,38,0.4);}
.mic-btn.listening{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 8px 32px rgba(22,163,74,0.5);animation:micPulse 0.8s infinite;}
.mic-label{color:rgba(255,255,255,0.5);font-size:13px;font-family:'Rubik',sans-serif;direction:rtl;}
.mic-label.active{color:var(--green);font-weight:700;}
.heard-text{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 16px;color:#fff;font-size:18px;font-weight:700;min-height:50px;text-align:center;margin-bottom:10px;font-style:italic;}

/* also show MC option for those who want it */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.opt{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:13px 8px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:16px;cursor:pointer;-webkit-appearance:none;width:100%;transition:all 0.1s;}
.opt:active{transform:scale(0.96);}
.opt.correct{background:rgba(74,222,128,0.2)!important;border-color:var(--green)!important;color:var(--green)!important;}
.opt.wrong{background:rgba(248,113,113,0.15)!important;border-color:#f87171!important;}
.or-divider{text-align:center;color:rgba(255,255,255,0.25);font-size:12px;margin:8px 0;letter-spacing:1px;}
.score-line{color:rgba(255,255,255,0.36);font-size:13px;margin-top:5px;text-align:center;}
.score-line b{color:var(--green);}

/* RESULT */
.res{text-align:center;padding-top:6px;}
.res-emoji{font-size:72px;display:block;margin-bottom:10px;animation:bIn 0.5s cubic-bezier(.4,2,.6,1);}
.res-title{color:#fff;font-weight:900;font-size:22px;margin-bottom:4px;}
.res-score{color:rgba(255,255,255,0.48);font-size:14px;margin-bottom:18px;}
.stars-row{display:flex;justify-content:center;gap:13px;margin-bottom:20px;}
.si{font-size:42px;opacity:0.2;}.si.on{opacity:1;animation:sPop 0.5s cubic-bezier(.4,2,.6,1) forwards;}
.words-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:12px 14px;margin-bottom:14px;}
.words-box-t{color:rgba(255,255,255,0.36);font-size:12px;margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.chip{background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.22);border-radius:20px;padding:3px 10px;color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;}
.chip:active{transform:scale(0.95);}
.res-btns{display:flex;flex-direction:column;gap:9px;}
.xp-box{background:linear-gradient(135deg,rgba(79,142,247,0.2),rgba(37,99,235,0.14));border:1px solid rgba(79,142,247,0.3);border-radius:16px;padding:11px 14px;margin-bottom:14px;text-align:center;}
.xp-box strong{color:#93c5fd;font-size:14px;}.xp-box p{color:rgba(255,255,255,0.42);font-size:12px;font-family:'Rubik',sans-serif;direction:rtl;margin-top:3px;}

/* speech mode toggle */
.mode-toggle{display:flex;gap:8px;margin-bottom:14px;}
.mode-btn{flex:1;border:none;border-radius:14px;padding:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;-webkit-appearance:none;transition:all 0.2s;}
.mode-btn.active-mode{background:linear-gradient(135deg,#4f8ef7,#2563eb);color:#fff;}
.mode-btn.inactive-mode{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(1.15);opacity:0}}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes bIn{0%{transform:scale(0.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes sPop{0%{transform:scale(0) rotate(-25deg);opacity:0}80%{transform:scale(1.25) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fIn{0%{transform:translateY(7px);opacity:0}100%{transform:translateY(0);opacity:1}}
.fin{animation:fIn 0.22s ease;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="back-btn" id="backBtn" style="display:none" onclick="goBack()">←</button>
      <div>
        <div class="logo-text">🎤 <span>SpeakUp!</span></div>
        <div class="logo-sub" id="hSub">לדבר אנגלית בקלות</div>
      </div>
    </div>
    <div class="star-pill"><span>⭐</span><span id="starCount">0</span></div>
  </div>

  <div class="scroll" id="scroll">

    <!-- ① PROFILE PICKER -->
    <div class="screen active" id="s-profiles">
      <div class="pick-head"><h1>👋 Who's learning?</h1><p>מי לומד עכשיו?</p></div>
      <div id="profileList"></div>
    </div>

    <!-- ② LEVEL PICKER -->
    <div class="screen" id="s-levels">
      <div class="lvl-head">
        <span class="av" id="lvlAv"></span>
        <h2 id="lvlName"></h2>
        <p>בחר את הרמה שלך</p>
      </div>
      <div id="levelList"></div>
    </div>

    <!-- ③ LESSON LIST -->
    <div class="screen" id="s-home">
      <div class="home-hdr" id="homeHdr"></div>
      <div id="lessonList"></div>
    </div>

    <!-- ④ LEARN (flashcard + listen + speak) -->
    <div class="screen" id="s-lesson">
      <div class="card-hdr">
        <div class="card-hdr-title" id="cardTitle"></div>
        <div class="card-hdr-count" id="cardCount"></div>
      </div>
      <div class="pbar-wrap"><div class="pbar" id="cardPbar" style="background:linear-gradient(90deg,var(--gold),var(--coral));width:12%"></div></div>

      <div class="word-card">
        <div class="wc-hebrew" id="wHebrew"></div>
        <div class="wc-english" id="wEnglish"></div>
        <div class="wc-example" id="wExample"></div>
      </div>

      <!-- Listen button -->
      <button class="listen-btn" id="listenBtn" onclick="speakWord()">
        🔊 Listen • שמע את המילה
      </button>

      <!-- Speak back button -->
      <button class="speak-btn" id="speakBackBtn" onclick="toggleSpeakBack()">
        🎤 Say it! • דבר את המילה
      </button>

      <div class="fb-card fin" id="lessonFb">
        <span class="fb-emoji" id="lessonFbEmoji"></span>
        <div class="fb-main" id="lessonFbMain"></div>
        <div class="fb-heard" id="lessonFbHeard"></div>
      </div>

      <div class="nav-row" style="margin-top:8px">
        <button class="btn btn-ghost" id="prevBtn" onclick="prevCard()">← הקודם</button>
        <button class="btn btn-blue"  id="nextBtn" onclick="nextCard()">הבא →</button>
      </div>
      <button class="btn btn-gold" id="quizBtn" style="display:none;margin-top:2px" onclick="startQuiz()">🎯 Practice Quiz! • חידון</button>
    </div>

    <!-- ⑤ QUIZ -->
    <div class="screen" id="s-quiz">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
        <div style="color:var(--gold);font-weight:800;font-size:16px">🎯 Speaking Quiz!</div>
        <div style="color:rgba(255,255,255,0.4);font-size:14px" id="qCount">1/8</div>
      </div>
      <div class="pbar-wrap"><div class="pbar" id="qPbar" style="background:linear-gradient(90deg,#4ade80,#22c55e);width:0%"></div></div>

      <div class="q-card">
        <div class="q-prompt">Say this word in English • אמור את המילה הזאת באנגלית:</div>
        <div class="q-hebrew" id="qHebrew"></div>
      </div>

      <!-- Mode toggle: speak or tap -->
      <div class="mode-toggle">
        <button class="mode-btn active-mode" id="modeSpeakBtn" onclick="setMode('speak')">🎤 Speak • דבר</button>
        <button class="mode-btn inactive-mode" id="modeTapBtn"   onclick="setMode('tap')">👆 Tap • לחץ</button>
      </div>

      <!-- SPEAK MODE -->
      <div id="speakMode">
        <div class="mic-wrap">
          <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
          <div class="mic-label" id="micLabel">Tap & say the English meaning • לחץ ואמור באנגלית</div>
        </div>
        <div class="heard-text" id="heardText">...</div>
        <button class="btn btn-blue" style="width:100%;margin-bottom:10px" onclick="checkSpoken()">✓ Check • בדוק</button>
      </div>

      <!-- TAP MODE (MC fallback) -->
      <div id="tapMode" style="display:none">
        <div class="opts-grid" id="mcOpts"></div>
      </div>

      <!-- Also play the word -->

/* ══════════════════════════════════
   SPEECH SYNTHESIS (TTS)
══════════════════════════════════ */
let voices=[];
function loadVoices(){
  voices=window.speechSynthesis.getVoices();
}
window.speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

function speak(text, onEnd){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.85; u.pitch=1;
  // prefer a native English voice
  const eng=voices.find(v=>v.lang.startsWith('en')&&!v.name.includes('Google'))||voices.find(v=>v.lang.startsWith('en'));
  if(eng) u.voice=eng;
  if(onEnd) u.onend=onEnd;
  window.speechSynthesis.speak(u);
}

/* ══════════════════════════════════
   SPEECH RECOGNITION (STT)
══════════════════════════════════ */
let recognition=null;
function initRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return null;
  const r=new SR();
  r.lang='en-US'; r.continuous=false; r.interimResults=true;
  return r;
}

function startListening(onResult, onEnd){
  if(recognition){recognition.abort();}
  recognition=initRecognition();
  if(!recognition){alert('מיקרופון לא נתמך בדפדפן זה. נסה Chrome.\nMic not supported. Please use Chrome.');return;}
  recognition.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    onResult(final||interim, !!final);
  };
  recognition.onend=()=>{ cur.recognizing=false; if(onEnd) onEnd(); };
  recognition.onerror=e=>{ cur.recognizing=false; if(onEnd) onEnd(); };
  recognition.start();
  cur.recognizing=true;
}

function stopListening(){
  if(recognition) recognition.stop();
  cur.recognizing=false;
}

function checkMatch(spoken, target){
  const clean=s=>s.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const sp=clean(spoken), tg=clean(target);
  if(sp===tg) return true;
  // fuzzy: check if all words of target appear as whole words in spoken
  const tWords=tg.split(' ');
  const sWords=sp.split(' ');
  return tWords.every(w=>sWords.includes(w));
}

      <div class="p-avatar">${u.emoji}</div>
      <div style="flex:1">
        <div class="p-name">${u.name} <span style="font-size:14px;color:rgba(255,255,255,0.35);font-family:'Rubik',sans-serif">${u.nameHe}</span></div>
        <div class="p-sub">⭐ ${total} stars total</div>
        <div class="p-levels">${pips}</div>
      </div>
      <div style="color:rgba(255,255,255,0.2);font-size:22px">›</div>
    </div>`;
  }).join('');
}
function selectUser(id){cur.userId=id;updateHeader();renderLevels();show('s-levels');}

/* ══════════════════════════════════
   LEVELS
══════════════════════════════════ */
function renderLevels(){
  const u=user();
  document.getElementById('lvlAv').textContent=u.emoji;
  document.getElementById('lvlName').textContent=u.name;
  document.getElementById('levelList').innerHTML=Object.entries(LEVEL_META).map(([k,m])=>{
    const ud2=data[cur.userId][k],total=LESSONS[k].length,done=ud2.done.length,pct=total?Math.round(done/total*100):0;
    return`<div class="${m.lc} lvl-card" onclick="selectLevel('${k}')">
      <div class="lvl-top">
        <div class="lvl-title">${m.icon} ${m.label} <span style="font-size:14px;color:rgba(255,255,255,0.35);font-family:'Rubik',sans-serif">${m.labelHe}</span></div>
        <span class="lvl-badge ${m.bdg}">⭐ ${ud2.stars}</span>
      </div>
      <div class="lvl-desc">${m.desc}</div>
      <div class="lvl-prow">
        <div class="lvl-pbar"><div class="lvl-pfill ${m.fill}" style="width:${pct}%"></div></div>
        <div class="lvl-ptext">${done}/${total} lessons</div>
      </div>
    </div>`;
  }).join('');
}
function selectLevel(level){cur.level=level;updateHeader();renderHome();show('s-home');}

/* ══════════════════════════════════
   HOME
══════════════════════════════════ */
function renderHome(){
  const u=user(),m=lm(),ud2=ud(),ls=LESSONS[cur.level];
  document.getElementById('homeHdr').innerHTML=`
    <div class="hh-av">${u.emoji}</div>
    <div style="flex:1">
      <div class="hh-name">${u.name} <span class="lvl-badge ${m.bdg}" style="font-size:10px">${m.icon} ${m.label}</span></div>
      <div class="hh-sub">🎤 ${m.desc} · ${ud2.done.length}/${ls.length} שיעורים</div>
    </div>
    <button class="sw-btn" onclick="goLevels()">Levels 📊</button>`;
  document.getElementById('lessonList').innerHTML=`
    <div class="sec-label">${m.icon} ${m.label} Lessons</div>
    ${ls.map(l=>{
      const dn=ud2.done.includes(l.id);
      return`<button class="lesson-row ${dn?'done':''}" onclick="startLesson('${l.id}')">
        <span class="lr-emoji">${l.emoji}</span>
        <div class="lr-info"><div class="lr-en">${l.en}</div><div class="lr-he">${l.he}</div><div class="lr-meta">${l.words.length} words • tap to listen & speak</div></div>
        ${dn?'<span class="lr-check">✓</span>':''}
        <span class="lr-arrow">›</span>
      </button>`;
    }).join('')}`;
  document.getElementById('starCount').textContent=ud2.stars;
}

/* ══════════════════════════════════
   LESSON (listen & repeat)
══════════════════════════════════ */
function startLesson(id){
  cur.lesson=LESSONS[cur.level].find(l=>l.id===id);
  cur.ci=0; updateCard(); show('s-lesson');
}
function updateCard(){
  const w=cur.lesson.words[cur.ci],t=cur.lesson.words.length;
  document.getElementById('cardTitle').textContent=cur.lesson.emoji+' '+cur.lesson.en;
  document.getElementById('cardCount').textContent=`${cur.ci+1} / ${t}`;
  document.getElementById('cardPbar').style.width=`${((cur.ci+1)/t)*100}%`;
  document.getElementById('wHebrew').textContent=w.h;
  document.getElementById('wEnglish').textContent=w.e;
  document.getElementById('wExample').textContent='"'+w.x+'"';
  document.getElementById('prevBtn').classList.toggle('btn-off',cur.ci===0);
  const last=cur.ci===t-1;
  document.getElementById('nextBtn').style.display=last?'none':'flex';
  document.getElementById('quizBtn').style.display='block';
  // reset UI
  const fb=document.getElementById('lessonFb'); fb.style.display='none'; fb.className='fb-card fin';
  const sb=document.getElementById('speakBackBtn'); sb.textContent='🎤 Say it! • דבר את המילה'; sb.className='speak-btn';
  window.speechSynthesis.cancel(); stopListening();
  // auto-play the word
  setTimeout(()=>speak(w.e),400);
}
function speakWord(){
  const w=cur.lesson.words[cur.ci];
  const btn=document.getElementById('listenBtn');
  btn.classList.add('playing'); btn.textContent='🔊 Playing...';
  speak(w.e,()=>{ btn.classList.remove('playing'); btn.textContent='🔊 Listen again • שמע שוב'; });
}
function toggleSpeakBack(){
  const btn=document.getElementById('speakBackBtn');
  if(cur.recognizing){
    stopListening();
    btn.textContent='🎤 Say it! • דבר את המילה'; btn.className='speak-btn';
    return;
  }
  btn.textContent='🎙️ Listening... • מקשיב...'; btn.className='speak-btn listening';
  const w=cur.lesson.words[cur.ci];
  startListening(
    (text,isFinal)=>{
      if(isFinal){
        btn.textContent='🎤 Say it! • דבר את המילה'; btn.className='speak-btn';
        const ok=checkMatch(text,w.e);
        showLessonFeedback(ok,text,w.e);
      }
    },
    ()=>{btn.textContent='🎤 Say it! • דבר את המילה'; btn.className='speak-btn';}
  );
}
function showLessonFeedback(ok,heard,target){
  const fb=document.getElementById('lessonFb');
  fb.className='fb-card fin '+(ok?'correct':'wrong');
  fb.style.display='block';
  document.getElementById('lessonFbEmoji').textContent=ok?['🎉','🌟','💪','✨','🔥','👏','🥳'][Math.floor(Math.random()*7)]:'😅';
  document.getElementById('lessonFbMain').textContent=ok?cheer():'!נסה שוב';
  document.getElementById('lessonFbHeard').textContent='I heard: "'+heard+'" · Target: "'+target+'"';
  if(ok) setTimeout(()=>{if(cur.ci<cur.lesson.words.length-1)nextCard();},1200);
}
function prevCard(){window.speechSynthesis.cancel();stopListening();if(cur.ci>0){cur.ci--;updateCard();}}
function nextCard(){window.speechSynthesis.cancel();stopListening();if(cur.ci<cur.lesson.words.length-1){cur.ci++;updateCard();}}

/* ══════════════════════════════════
   QUIZ
══════════════════════════════════ */
function startQuiz(){
  const words=cur.lesson.words,pool=LESSONS[cur.level].flatMap(l=>l.words);
  cur.qq=shuffle(words).map(word=>{
    const wrong=shuffle(pool.filter(w=>w.e!==word.e)).slice(0,3).map(w=>w.e);
    return{word,options:shuffle([word.e,...wrong])};
  });
  cur.qi=0; cur.qs=0; cur.fa=false; cur.quizMode='speak';
  renderQ(); show('s-quiz');
}
function setMode(m){
  cur.quizMode=m; stopListening();
  document.getElementById('modeSpeakBtn').className='mode-btn '+(m==='speak'?'active-mode':'inactive-mode');
  document.getElementById('modeTapBtn').className='mode-btn '+(m==='tap'?'active-mode':'inactive-mode');
  document.getElementById('speakMode').style.display=m==='speak'?'block':'none';
  document.getElementById('tapMode').style.display=m==='tap'?'block':'none';
  document.getElementById('qFb').style.display='none';
}
function renderQ(){
  const q=cur.qq[cur.qi],t=cur.qq.length;
  document.getElementById('qCount').textContent=`${cur.qi+1} / ${t}`;
  document.getElementById('qPbar').style.width=`${(cur.qi/t)*100}%`;
  document.getElementById('qScore').textContent=cur.qs;
  document.getElementById('qHebrew').textContent=q.word.h;
  document.getElementById('qFb').style.display='none';
  document.getElementById('heardText').textContent='...';
  cur.spokenText=''; cur.fa=false;
  // reset mic
  const mb=document.getElementById('micBtn'); mb.textContent='🎤'; mb.className='mic-btn';
  document.getElementById('micLabel').textContent='לחץ ודבר באנגלית'; document.getElementById('micLabel').className='mic-label';
  // MC options
  document.getElementById('mcOpts').innerHTML=q.options.map(o=>`
    <button class="opt" onclick="subMC(this,'${o.replace(/'/g,"\\'")}','${q.word.e.replace(/'/g,"\\'")}')">
      ${o}
    </button>`).join('');
  // set mode display
  setMode(cur.quizMode);
  // auto play the hebrew word (using TTS in english for the english word after a pause)
}
function playCurrentQ(){
  const q=cur.qq[cur.qi]; speak(q.word.e);
}
function toggleMic(){
  if(cur.fa) return;
  if(cur.recognizing){ stopListening(); resetMicUI(); return; }
  const mb=document.getElementById('micBtn'); mb.className='mic-btn listening'; mb.textContent='🛑';
  document.getElementById('micLabel').textContent='מקשיב... דבר עכשיו!'; document.getElementById('micLabel').className='mic-label active';
  const q=cur.qq[cur.qi];
  startListening(
    (text,isFinal)=>{
      document.getElementById('heardText').textContent=text||'...';
      cur.spokenText=text;
      if(isFinal){ stopListening(); resetMicUI(); }
    },
    ()=>resetMicUI()
  );
}
function resetMicUI(){
  const mb=document.getElementById('micBtn'); mb.className='mic-btn'; mb.textContent='🎤';
  document.getElementById('micLabel').textContent='לחץ ודבר באנגלית'; document.getElementById('micLabel').className='mic-label';
}
function checkSpoken(){
  if(cur.fa) return;
  const q=cur.qq[cur.qi];
  const spoken=cur.spokenText||document.getElementById('heardText').textContent;
  if(!spoken||spoken==='...'){alert('דבר קודם! Speak first!');return;}
  const ok=checkMatch(spoken,q.word.e);
  handleAnswer(ok,spoken,q.word.e);
}
function subMC(btn,chosen,correct){
  if(cur.fa) return; cur.fa=true;
  const ok=chosen===correct;
  if(ok) btn.classList.add('correct');
  else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('correct');});}
  handleAnswer(ok,chosen,correct,true);
}
function handleAnswer(ok,heard,target,skipSpeak){
  cur.fa=true;
  if(ok){cur.qs++; if(!skipSpeak) speak(target);}
  const fb=document.getElementById('qFb');
  fb.className='fb-card fin '+(ok?'correct':'wrong'); fb.style.display='block';
  document.getElementById('qFbEmoji').textContent=ok?['🎉','🌟','💪','✨','🔥','👏','🥳'][Math.floor(Math.random()*7)]:'😅';
  document.getElementById('qFbMain').textContent=ok?cheer():'!נסה שוב';
  document.getElementById('qFbHeard').textContent=ok?'✓ "'+target+'"':'I heard: "'+heard+'" → "'+target+'"';
  document.getElementById('qScore').textContent=cur.qs;
  setTimeout(advQ,1300);
}
function advQ(){cur.fa=false;stopListening();window.speechSynthesis.cancel();cur.qi++;if(cur.qi>=cur.qq.length)showResult();else renderQ();}

/* ══════════════════════════════════
   RESULT
══════════════════════════════════ */
function showResult(){
  stopListening(); window.speechSynthesis.cancel();
  const t=cur.qq.length,sc=cur.qs;
  const earned=sc>=Math.ceil(t*0.85)?3:sc>=Math.ceil(t*0.6)?2:1;
  const ud2=ud(),wasNew=!ud2.done.includes(cur.lesson.id);
  ud2.stars+=earned; if(wasNew) ud2.done.push(cur.lesson.id); save();
  document.getElementById('starCount').textContent=ud2.stars;
  const msgs={
    beginner:['!התחלה מצוינת','!עבודה טובה','!המשך כך'],
    intermediate:['!מצוין','!כל הכבוד','!ממשיכים להתאמן'],
    advanced:['!יוצא מן הכלל','!מרשים מאוד','!מאמץ יפה'],
  };
  document.getElementById('rEmoji').textContent=earned===3?'🏆':earned===2?'🌟':'💪';
  document.getElementById('rTitle').textContent=msgs[cur.level][3-earned];
  document.getElementById('rScore').textContent=`${sc} / ${t} correct`;
  ['st1','st2','st3'].forEach((id,i)=>{const el=document.getElementById(id);el.className='si';if(i<earned)setTimeout(()=>el.className='si on',i*220+150);});
  const all=LESSONS[cur.level],xb=document.getElementById('xpBox');
  if(wasNew&&ud2.done.length===all.length){xb.style.display='block';document.getElementById('xpT').textContent='🎓 Level complete!';document.getElementById('xpSub').textContent='כל השיעורים ב-'+lm().labelHe+' הושלמו!';}
  else if(wasNew){xb.style.display='block';document.getElementById('xpT').textContent=`+${earned} ⭐ earned!`;document.getElementById('xpSub').textContent=`${ud2.done.length}/${all.length} שיעורים הושלמו`;}
  else xb.style.display='none';
  // chips that speak on tap
  document.getElementById('wChips').innerHTML=cur.lesson.words.map(w=>`<span class="chip" onclick="speak('${w.e.replace(/'/g,"\\'")}')">🔊 ${w.e}</span>`).join('');
  show('s-result');
}
function retryQuiz(){startQuiz();}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
load(); updateHeader(); renderProfiles();
</script>
